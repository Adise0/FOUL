<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="../scripts/Pause.js"></script>
    <link rel="stylesheet" href="./Pause.css" />
    <link rel="stylesheet" href="../Global.css" />
    <title>Pause</title>
  </head>
  <body>
    <div class="holder">
      <p class="paused">Paused</p>
      <div class="info">
        <p>Catch the ball and bounce it to break the walls and gain points!</p>
        <p>Special walls grant you:</p>
        <br />
        <div class="items">
          <div class="item">
            <img src="../img/ball.png" alt="" /> More balls
          </div>
          <div class="item">
            <img src="../img/player.png" alt="" /> More players
          </div>
          <div class="item">
            <img src="../img/fire.png" alt="" /> A fire ball!
          </div>
        </div>
      </div>
      <div class="controls">
        <div class="control-item">
          <div class="icons">
            <img src="../img/inputs/A.png" alt="" />
            <img src="../img/inputs/D.png" alt="" />
          </div>
          <p class="control">PRESS TO MOVE</p>
        </div>
        <div class="control-item">
          <div class="icons">
            <img src="../img/inputs/Left_pressed.png" alt="" />
            <img src="../img/inputs/Right_pressed.png" alt="" />
          </div>
          <p class="control">CLICK TO ROTATE</p>
        </div>
        <div class="control-item">
          <div class="icons">
            <img src="../img/inputs/Esc.png" alt="" />
          </div>
          <p class="control">PRESS TO PAUSE / UNPAUSE</p>
        </div>
      </div>
      <div class="click">
        PRESS ESC <img src="../img/inputs/Esc.png" alt="" /> TO CONTINUE
      </div>
    </div>
  </body>
</html>
