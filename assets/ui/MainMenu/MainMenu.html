<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script type="module" src="../scripts/MainMenu.js"></script>
    <link rel="stylesheet" href="./MainMenu.css" />
    <link rel="stylesheet" href="../Global.css" />
    <title>Main Menu</title>
  </head>
  <body>
    <main class="root">
      <img src="../img/Dudes.png" alt="" class="dudes" />
      <img src="../img/Title.png" alt="FOUL" class="title" />
      <div class="optionsContainer">
        <section class="options">
          <a
            href="../Play/Play.html"
            class="play"
            onmouseenter="Send('PlaySound', 'select')"
            onclick="Send('PlaySound', 'click')"
            >PLAY</a
          >
          <a
            href="../Leaderboard/Leaderboard.html"
            id="leaderboard"
            class="normal"
            onmouseenter="Send('PlaySound', 'select')"
            onclick="Send('PlaySound', 'click')"
            >LEADERBOARD</a
          >
          <a
            href="../Credits/Credits.html"
            class="normal"
            onmouseenter="Send('PlaySound', 'select')"
            onclick="Send('PlaySound', 'click')"
            >CREDITS</a
          >
        </section>
      </div>
      <button id="quit" class="back" onmouseenter="Send('PlaySound', 'select')">
        QUIT
      </button>
    </main>
  </body>
</html>
